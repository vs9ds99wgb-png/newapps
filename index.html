<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Desktop — Полная версия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0e1117;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Основное окно */
        .telegram-app {
            width: 1100px;
            height: 700px;
            background: #17212b;
            border-radius: 12px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(0, 0, 0, 0.5);
        }

        /* Левая панель (список чатов) */
        .sidebar {
            width: 320px;
            background: #17212b;
            border-right: 1px solid #242f3d;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 18px 16px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-icon {
            font-size: 20px;
            color: #7e8c9e;
            cursor: pointer;
        }

        .search-box {
            flex: 1;
            background: #242f3d;
            border-radius: 24px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #7e8c9e;
            font-size: 14px;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
        }

        .chat-item {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .chat-item.active {
            background: #2b5278;
        }

        .chat-item:hover:not(.active) {
            background: #1e2a36;
        }

        .chat-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #2b5278, #1d3a55);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: white;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
        }

        .chat-name {
            color: white;
            font-weight: 600;
            font-size: 15px;
        }

        .chat-preview {
            color: #7e8c9e;
            font-size: 13px;
            margin-top: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 170px;
        }

        /* Правая панель */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #17212b;
        }

        .chat-header {
            padding: 16px 20px;
            background: #17212b;
            border-bottom: 1px solid #242f3d;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .chat-header-avatar {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #2b5278, #1d3a55);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-name {
            color: white;
            font-weight: 600;
            font-size: 16px;
        }

        .chat-header-status {
            color: #5ac73e;
            font-size: 13px;
        }

        .settings-icon {
            font-size: 20px;
            color: #7e8c9e;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: 0.1s;
        }

        .settings-icon:hover {
            background: #242f3d;
            color: white;
        }

        /* Настройки */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: #17212b;
            border-left: 1px solid #242f3d;
            z-index: 1000;
            transition: right 0.3s ease;
            padding: 20px;
            color: white;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .settings-panel.open {
            right: 0;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 16px;
            border-bottom: 1px solid #242f3d;
        }

        .settings-header h3 {
            font-weight: 500;
        }

        .close-settings {
            font-size: 24px;
            cursor: pointer;
            color: #7e8c9e;
        }

        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #242f3d;
        }

        .theme-toggle {
            background: #2b5278;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
        }

        /* Область сообщений */
        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px 20px 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message-row {
            display: flex;
            margin-bottom: 4px;
        }

        .message-row.outgoing {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.4;
        }

        .outgoing .message-bubble {
            background: #2b5278;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .incoming .message-bubble {
            background: #242f3d;
            color: #e1e4e8;
            border-bottom-left-radius: 5px;
        }

        .message-text {
            word-break: break-word;
        }

        .file-attachment {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 12px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .file-icon {
            font-size: 28px;
        }

        .file-info {
            flex: 1;
        }

        .file-name {
            font-weight: 500;
            font-size: 13px;
            word-break: break-all;
        }

        .file-size {
            font-size: 11px;
            opacity: 0.7;
        }

        /* Панель ввода */
        .input-panel {
            background: #17212b;
            padding: 12px 20px;
            border-top: 1px solid #242f3d;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .attach-btn {
            background: #242f3d;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            cursor: pointer;
            transition: 0.1s;
            color: #7e8c9e;
        }

        .attach-btn:hover {
            background: #2b5278;
            color: white;
        }

        .message-input {
            flex: 1;
            background: #242f3d;
            border: none;
            padding: 12px 18px;
            border-radius: 28px;
            color: white;
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        .message-input::placeholder {
            color: #7e8c9e;
        }

        .send-btn {
            background: #2b5278;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            color: white;
            font-size: 18px;
        }

        .send-btn:hover {
            background: #3e6b99;
        }

        input[type="file"] {
            display: none;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #4a5b6e;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="telegram-app">
    <!-- Боковая панель -->
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="menu-icon">☰</div>
            <div class="search-box">
                <span>🔍</span> Поиск
            </div>
        </div>
        <div class="chat-list" id="chatList">
            <div class="chat-item active" data-chat="echo">
                <div class="chat-avatar">🤖</div>
                <div class="chat-info">
                    <div class="chat-name">Echo Bot</div>
                    <div class="chat-preview">Напиши что-нибудь...</div>
                </div>
            </div>
            <div class="chat-item" data-chat="friend">
                <div class="chat-avatar">👤</div>
                <div class="chat-info">
                    <div class="chat-name">Анна</div>
                    <div class="chat-preview">Привет! Как дела?</div>
                </div>
            </div>
            <div class="chat-item" data-chat="work">
                <div class="chat-avatar">💼</div>
                <div class="chat-info">
                    <div class="chat-name">Работа</div>
                    <div class="chat-preview">Встреча в 15:00</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Чат -->
    <div class="chat-panel">
        <div class="chat-header">
            <div class="chat-header-avatar" id="currentChatAvatar">🤖</div>
            <div class="chat-header-info">
                <div class="chat-header-name" id="currentChatName">Echo Bot</div>
                <div class="chat-header-status">в сети</div>
            </div>
            <div class="settings-icon" id="settingsBtn">⚙️</div>
        </div>

        <div class="messages-area" id="messagesArea"></div>

        <div class="input-panel">
            <label class="attach-btn" id="attachBtn">📎</label>
            <input type="file" id="fileInput" accept="*/*">
            <input type="text" class="message-input" id="messageInput" placeholder="Сообщение" autocomplete="off">
            <div class="send-btn" id="sendBtn">➤</div>
        </div>
    </div>
</div>

<!-- Панель настроек -->
<div class="settings-panel" id="settingsPanel">
    <div class="settings-header">
        <h3>Настройки</h3>
        <div class="close-settings" id="closeSettingsBtn">✕</div>
    </div>
    <div class="setting-item">
        <span>🌙 Тёмная тема</span>
        <div class="theme-toggle" id="themeToggle">Включена</div>
    </div>
    <div class="setting-item">
        <span>🔊 Звук уведомлений</span>
        <div class="theme-toggle" id="soundToggle">Вкл</div>
    </div>
    <div class="setting-item">
        <span>🤖 Режим эхо (бот повторяет)</span>
        <div class="theme-toggle" id="echoToggle">Вкл</div>
    </div>
</div>

<script>
    // Данные чатов: история сообщений для каждого чата
    let chatsData = {
        echo: {
            name: "Echo Bot",
            avatar: "🤖",
            messages: [
                { text: "Привет! Я повторяю любые твои сообщения — текст, фото, файлы.", isOutgoing: false, file: null }
            ]
        },
        friend: {
            name: "Анна",
            avatar: "👤",
            messages: [
                { text: "Привет! Как дела?", isOutgoing: false, file: null },
                { text: "Отлично! А у тебя?", isOutgoing: true, file: null },
                { text: "Тоже хорошо! Как прошёл день?", isOutgoing: false, file: null }
            ]
        },
        work: {
            name: "Работа",
            avatar: "💼",
            messages: [
                { text: "Встреча в 15:00, не опаздывай", isOutgoing: false, file: null },
                { text: "Хорошо, буду вовремя", isOutgoing: true, file: null }
            ]
        }
    };

    let currentChat = "echo";
    let echoEnabled = true;

    // DOM элементы
    const messagesContainer = document.getElementById('messagesArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const attachBtn = document.getElementById('attachBtn');
    const fileInput = document.getElementById('fileInput');
    const chatItems = document.querySelectorAll('.chat-item');
    const currentChatName = document.getElementById('currentChatName');
    const currentChatAvatar = document.getElementById('currentChatAvatar');
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsPanel = document.getElementById('settingsPanel');
    const closeSettingsBtn = document.getElementById('closeSettingsBtn');
    const themeToggle = document.getElementById('themeToggle');
    const soundToggle = document.getElementById('soundToggle');
    const echoToggle = document.getElementById('echoToggle');

    // Вспомогательные функции
    function getTime() {
        const now = new Date();
        return now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, (m) => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
    }

    function renderMessages() {
        messagesContainer.innerHTML = '';
        const messages = chatsData[currentChat].messages;
        messages.forEach(msg => {
            const messageRow = document.createElement('div');
            messageRow.className = `message-row ${msg.isOutgoing ? 'outgoing' : 'incoming'}`;
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';

            if (msg.file) {
                const fileDiv = document.createElement('div');
                fileDiv.className = 'file-attachment';
                fileDiv.innerHTML = `
                    <div class="file-icon">📄</div>
                    <div class="file-info">
                        <div class="file-name">${escapeHtml(msg.file.name)}</div>
                        <div class="file-size">${(msg.file.size / 1024).toFixed(1)} KB</div>
                    </div>
                `;
                bubble.appendChild(fileDiv);
            } else if (msg.text) {
                const textDiv = document.createElement('div');
                textDiv.className = 'message-text';
                textDiv.textContent = msg.text;
                bubble.appendChild(textDiv);
            }

            messageRow.appendChild(bubble);
            messagesContainer.appendChild(messageRow);
        });
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function addMessageToChat(chatId, text, isOutgoing, file = null) {
        const msg = { text, isOutgoing, file, time: getTime() };
        chatsData[chatId].messages.push(msg);
        if (chatId === currentChat) {
            renderMessages();
        }
        // Обновляем превью в списке чатов
        const preview = text ? (text.length > 30 ? text.slice(0, 30) + '...' : text) : (file ? '📎 Файл' : '');
        const chatItem = document.querySelector(`.chat-item[data-chat="${chatId}"] .chat-preview`);
        if (chatItem && preview) chatItem.textContent = preview;
    }

    function switchChat(chatId) {
        currentChat = chatId;
        const chatData = chatsData[chatId];
        currentChatName.textContent = chatData.name;
        currentChatAvatar.textContent = chatData.avatar;
        
        // Обновляем активный класс
        document.querySelectorAll('.chat-item').forEach(item => {
            if (item.getAttribute('data-chat') === chatId) {
                item.classList.add('active');
            } else {
                item.classList.remove('active');
            }
        });
        
        renderMessages();
    }

    // Отправка сообщения
    function sendMessage() {
        const text = messageInput.value.trim();
        if (!text) return;
        
        // Добавляем своё сообщение
        addMessageToChat(currentChat, text, true);
        
        // Эхо-ответ (только для Echo Bot)
        if (currentChat === 'echo' && echoEnabled) {
            setTimeout(() => {
                addMessageToChat(currentChat, text, false);
            }, 200);
        }
        
        messageInput.value = '';
    }

    function sendFile(file) {
        if (!file) return;
        
        // Добавляем свой файл
        addMessageToChat(currentChat, '', true, file);
        
        // Эхо-ответ для Echo Bot
        if (currentChat === 'echo' && echoEnabled) {
            setTimeout(() => {
                addMessageToChat(currentChat, '', false, file);
            }, 300);
        }
    }

    // Настройки темы
    function setTheme(isDark) {
        if (isDark) {
            document.body.style.background = '#0e1117';
            document.querySelector('.telegram-app').style.background = '#17212b';
            themeToggle.textContent = 'Включена';
        } else {
            document.body.style.background = '#e8eef2';
            document.querySelector('.telegram-app').style.background = '#ffffff';
            themeToggle.textContent = 'Выкл';
        }
    }

    let isDarkTheme = true;
    let soundEnabled = true;

    // Инициализация
    renderMessages();

    // Обработчики
    chatItems.forEach(item => {
        item.addEventListener('click', () => {
            const chatId = item.getAttribute('data-chat');
            switchChat(chatId);
        });
    });

    sendBtn.addEventListener('click', sendMessage);
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    attachBtn.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            sendFile(e.target.files[0]);
            fileInput.value = '';
        }
    });

    // Настройки
    settingsBtn.addEventListener('click', () => {
        settingsPanel.classList.add('open');
    });
    closeSettingsBtn.addEventListener('click', () => {
        settingsPanel.classList.remove('open');
    });
    themeToggle.addEventListener('click', () => {
        isDarkTheme = !isDarkTheme;
        setTheme(isDarkTheme);
    });
    soundToggle.addEventListener('click', () => {
        soundEnabled = !soundEnabled;
        soundToggle.textContent = soundEnabled ? 'Вкл' : 'Выкл';
    });
    echoToggle.addEventListener('click', () => {
        echoEnabled = !echoEnabled;
        echoToggle.textContent = echoEnabled ? 'Вкл' : 'Выкл';
    });

    setTheme(true);
</script>
</body>
</html>
